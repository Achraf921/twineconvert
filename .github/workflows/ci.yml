name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a newer commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + type check, fastest gate, fails first.
  lint:
    name: Lint + type check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript --noEmit
        run: npx tsc --noEmit

  # Bijectivity gate. Re-runs the audit and fails the build if the count
  # of bijective pairs missing a round-trip test exceeds the cap baked
  # into scripts/bijectivity-audit.mjs. Cheap (no test execution, just a
  # static scan), runs in parallel with the heavier test job.
  audit:
    name: Bijectivity audit
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Run bijectivity audit (strict)
        run: node scripts/bijectivity-audit.mjs --strict

  # Unit + round-trip + fuzz tests, covers ~196 converters across 5 layers
  # of validation (registry integrity, real-file conversion, structural
  # output validation, round-trip equivalence, content preservation,
  # adversarial fuzz).
  test:
    name: Unit + round-trip + fuzz tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # Browser-mode tests for the converters that need real Chromium
  # (Canvas, FFmpeg.wasm Workers, libheif, web-ifc WASM, etc.).
  # Runs Vitest browser mode via Playwright/Chromium headless.
  test-browser:
    name: Browser-mode tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - run: npm run test:browser

  # Production build verification. We use webpack (not Turbopack) because
  # Turbopack OOMs on our 192-converter dynamic-import set; webpack chunks
  # them cleanly. NODE_OPTIONS bumps the heap to 8GB which Vercel's CI
  # instances can spare.
  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Regenerate registry meta
        run: npx tsx scripts/generate-registry-meta.ts
      - name: Build
        run: NODE_OPTIONS="--max-old-space-size=8192" npx next build --webpack
      - name: Upload build output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 7
